name: Deploy to Vercel & Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Optional: Keep app warm by deploying daily (comment out if not needed)
    # - cron: '0 0 * * 0'  # Every Sunday at midnight UTC

permissions:
  contents: read

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install
          cd client && npm install && cd ..
      
      - name: Lint code
        run: npm run lint
        continue-on-error: true

  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: validate
    if: success()
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Error: RAILWAY_TOKEN is not set"
            echo "See GITHUB_ACTIONS_SETUP.md for setup instructions"
            exit 1
          fi
          
          npm install -g @railway/cli
          railway link "$RAILWAY_PROJECT_ID" --token "$RAILWAY_TOKEN"
          railway up

      - name: Backend Deployment Success
        if: success()
        run: echo "✅ Backend deployed successfully to Railway"

      - name: Backend Deployment Failed
        if: failure()
        run: |
          echo "❌ Backend deployment failed"
          echo "Check logs above for details"
          exit 1

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: success()
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_ORG_ID" ]; then
            echo "Error: Missing Vercel secrets"
            echo "Required: VERCEL_TOKEN, VERCEL_PROJECT_ID, VERCEL_ORG_ID"
            echo "See GITHUB_ACTIONS_SETUP.md for setup instructions"
            exit 1
          fi
          
          npm install -g vercel
          vercel deploy --prod \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID"

      - name: Frontend Deployment Success
        if: success()
        run: echo "✅ Frontend deployed successfully to Vercel"

      - name: Frontend Deployment Failed
        if: failure()
        run: |
          echo "❌ Frontend deployment failed"
          echo "Check logs above for details"
          exit 1

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Check Deployment Status
        run: |
          if [ "${{ needs.deploy-backend.result }}" = "success" ] && [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            echo "✅ All deployments successful!"
            exit 0
          else
            echo "❌ Some deployments failed"
            echo "Backend: ${{ needs.deploy-backend.result }}"
            echo "Frontend: ${{ needs.deploy-frontend.result }}"
            exit 1
          fi
